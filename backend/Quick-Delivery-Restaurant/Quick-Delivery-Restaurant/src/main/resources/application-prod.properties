spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver



spring.jpa.properties.hibernate.statement_cache.size=0
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# ===============================
# CONFIGURACIÓN BASE DE DATOS H2
# ===============================
#spring.datasource.url=jdbc:h2:file:./data/restaurant
#spring.datasource.driver-class-name=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=

# ===============================
# CONFIGURACIÓN JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# ===============================
# MOSTRAR SQL (opcional)
# ===============================
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===============================
# CONSOLA H2 (para depurar)
# ===============================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# PUERTO DEL SERVIDOR
# ===============================
server.port=8081

# ===============================
# DESHABILITAR SERVICIOS NUBE (opcional)
# ===============================
eureka.client.enabled=false
spring.cloud.config.enabled=false


# ========================
# MICROSERVICIOS
# ========================

client-service.url=${CLIENT_URL}
delivery-service.url=${DELIVERY_URL}
frontend.url=${FRONTEND_URL}
edge-service.url=${EDGE_URL}
