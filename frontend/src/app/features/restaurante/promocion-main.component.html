<div class="mt-8">
  <div class="flex justify-between items-center mb-4">
    <h3 class="text-lg font-semibold text-gray-800">Mis promociones</h3>
    <button
      type="button"
      (click)="abrirModalCrear()"
      class="px-4 py-2 bg-gradient-to-r from-red-600 via-rose-500 to-amber-400 text-white rounded-lg hover:opacity-90 text-sm font-medium"
    >
      + Nueva promoción
    </button>
  </div>

  <div *ngIf="cargandoLista" class="text-sm text-gray-500">Cargando promociones...</div>
  <div *ngIf="errorLista" class="text-sm text-red-600">{{ errorLista }}</div>

  <div *ngIf="!cargandoLista && promociones.length === 0" class="text-sm text-gray-500">
    No tienes promociones registradas.
  </div>

  <div *ngIf="promociones.length > 0" class="space-y-3">
    <div *ngFor="let promo of promociones" class="border rounded px-4 py-3 text-sm space-y-2">
      <div class="flex justify-between">
        <div>
          <p class="font-semibold">
            {{ promo.codigo }} - {{ promo.descuentoPorcentaje }}%
          </p>
          <p class="text-gray-500">
            Expira: {{ promo.fechaExpiracion || 'Sin fecha' }} |
            Estado: {{ promo.estado }}
          </p>
        </div>
      </div>

      <!-- Cambiar estado -->
      <div class="flex flex-wrap items-center gap-2">
        <span class="text-xs text-gray-500">Cambiar estado:</span>
        <button class="px-2 py-1 text-xs rounded bg-green-100 text-green-700"
                (click)="cambiarEstado(promo, 'ACTIVA')">Activa</button>
        <button class="px-2 py-1 text-xs rounded bg-yellow-100 text-yellow-700"
                (click)="cambiarEstado(promo, 'EXPIRADA')">Expirada</button>
        <button class="px-2 py-1 text-xs rounded bg-gray-100 text-gray-700"
                (click)="cambiarEstado(promo, 'INACTIVA')">Inactiva</button>
        <button class="px-2 py-1 text-xs rounded bg-red-100 text-red-700"
                (click)="cambiarEstado(promo, 'AGOTADA')">Agotada</button>
      </div>

      <!-- Cambiar fecha de expiración -->
      <div class="flex flex-wrap items-center gap-2">
        <label class="text-xs text-gray-500">Nueva fecha:</label>
        <input
        title="x"
          type="date"
          class="border rounded px-2 py-1 text-xs"
          #fechaInput
        />
        <button
          class="px-2 py-1 text-xs rounded bg-blue-500 text-white"
          (click)="cambiarFechaExpiracion(promo, fechaInput.value)">
          Guardar fecha
        </button>
      </div>

      <!-- Cambiar cantidad de usos -->
      <div class="flex flex-wrap items-center gap-2">
        <label class="text-xs text-gray-500">Cantidad de usos:</label>
        <input
        title="x"
          type="number"
          min="0"
          class="border rounded px-2 py-1 text-xs w-20"
          [value]="promo.cantidadUsos"
          #usosInput
        />
        <button
          class="px-2 py-1 text-xs rounded bg-amber-500 text-white"
          (click)="actualizarCantidadUsos(promo, usosInput.valueAsNumber)">
          Guardar usos
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Modal crear promoción -->
<div
  *ngIf="mostrarModal"
  class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50"
  (click)="cerrarModal()"
>
  <div
    class="bg-white rounded-lg w-full max-w-lg max-h-[90vh] overflow-y-auto p-6"
    (click)="$event.stopPropagation()"
  >
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-xl font-bold text-gray-800">Crear Promoción</h2>
      <button
        type="button"
        (click)="cerrarModal()"
        class="text-gray-400 hover:text-gray-600"
      >
        ✕
      </button>
    </div>

    <form [formGroup]="promocionForm" (ngSubmit)="crearPromocion()" class="space-y-4">
      <div>
        <label class="block text-gray-700 mb-2" for="codigo">Código</label>
        <input
          formControlName="codigo"
          id="codigo"
          type="text"
          placeholder="SUMMER2025"
          class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <div>
        <label class="block text-gray-700 mb-2" for="descuentoPorcentaje">Descuento (%)</label>
        <input
          formControlName="descuentoPorcentaje"
          id="descuentoPorcentaje"
          type="number"
          min="1"
          max="100"
          class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-green-500"
        />
      </div>

      <div>
        <label class="block text-gray-700 mb-2" for="fechaExpiracion">Fecha Expiración</label>
        <input
          formControlName="fechaExpiracion"
          id="fechaExpiracion"
          type="date"
          class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-yellow-500"
        />
      </div>

      <div>
        <label class="block text-gray-700 mb-2" for="estado">Estado inicial</label>
        <select
        title="x"
          formControlName="estado"
          class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-purple-500"
        >
          <option value="ACTIVA">Activa</option>
          <option value="EXPIRADA">Expirada</option>
          <option value="INACTIVA">Inactiva</option>
          <option value="AGOTADA">Agotada</option>
        </select>
      </div>

      <button
        type="submit"
        [disabled]="loading || promocionForm.invalid"
        class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded transition-colors"
      >
        {{ loading ? 'Creando...' : 'Crear Promoción' }}
      </button>

      <div *ngIf="mensaje" class="text-center text-sm mt-2 text-green-600">
        {{ mensaje }}
      </div>
    </form>
  </div>
</div>
