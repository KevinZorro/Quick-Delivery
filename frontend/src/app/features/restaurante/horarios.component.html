<div class="p-6 space-y-4">

  <!-- BOTÓN AGREGAR -->
  <button (click)="abrirModalCrear()"
    class="bg-gradient-to-r from-red-500 via-orange-500 to-yellow-500
           text-white font-semibold px-5 py-2 rounded-xl shadow-md
           hover:opacity-90 transition">
    + Agregar Horario
  </button>

  <p *ngIf="cargando" class="text-orange-600 font-semibold">Cargando...</p>

  <!-- LISTA / TARJETAS -->
  <div class="grid gap-4">
    <div *ngFor="let h of horarios"
      class="border border-orange-300 bg-yellow-50 rounded-xl p-4 shadow">

      <p class="font-bold text-orange-700 text-lg">{{ h.diaSemana }}</p>
      <p class="text-gray-700">{{ h.horaApertura }} - {{ h.horaCierre }}</p>

      <button (click)="eliminarHorario(h)"
        class="mt-3 bg-red-600 text-white px-3 py-1 rounded-lg shadow
               hover:bg-red-700 transition">
        Eliminar
      </button>
    </div>
  </div>


  <!-- MODAL -->
  <div *ngIf="mostrarModal"
       class="fixed inset-0 bg-black bg-opacity-40 flex justify-center items-center z-50">

    <div class="bg-white p-6 rounded-2xl shadow-xl w-96 border-t-4 border-orange-500">

      <h2 class="text-xl font-bold text-orange-700 mb-4">Crear Horario</h2>

      <form [formGroup]="horarioForm" (ngSubmit)="crearHorario()" class="space-y-3">

        <div>
          <label for="diaSemana" class="font-semibold text-gray-600">Día de la semana</label>
          <select id="diaSemana" formControlName="diaSemana"
                  class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-orange-400">
            <option *ngFor="let d of diasSemana" [value]="d">{{ d }}</option>
          </select>
        </div>

        <div>
          <label for="horaApertura" class="font-semibold text-gray-600">Hora apertura</label>
          <input id="horaApertura" type="time"
                 formControlName="horaApertura"
                 class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-yellow-400">
        </div>

        <div>
          <label for="horaCierre" class="font-semibold text-gray-600">Hora cierre</label>
          <input id="horaCierre" type="time"
                 formControlName="horaCierre"
                 class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-red-400">
        </div>

        <!-- BOTÓN GUARDAR -->
        <button type="submit"
          class="bg-gradient-to-r from-red-500 via-orange-500 to-yellow-500
                 text-white font-semibold px-4 py-2 rounded-xl w-full shadow-md
                 hover:opacity-90 transition">
          Guardar
        </button>
      </form>

      <!-- BOTÓN CERRAR -->
      <button class="mt-4 text-gray-600 hover:text-red-500 font-semibold"
              (click)="cerrarModal()">
        Cerrar
      </button>
    </div>

  </div>

</div>
