<div class="min-h-screen bg-white font-poppins">
  <!-- Header del Restaurante -->
  <header
    class="bg-gradient-to-r from-red-600 via-rose-500 to-amber-400 shadow-sm"
  >
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 text-white">
      <div class="flex justify-between items-center">
        <div>
          <p class="text-sm font-semibold">Panel de Restaurante</p>
          <h1 class="text-2xl opacity-90 mt-1">{{ restauranteNombre }}</h1>
        </div>

        <!-- Botones de navegación y cerrar sesión -->
        <div class="flex items-center gap-3">
          <!-- Volver -->
          <button
            (click)="volver()"
            class="px-4 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600 transition-colors duration-200 text-sm font-medium flex items-center gap-2"
          >
            <span>←</span>
            <span class="hidden sm:inline">Volver</span>
          </button>

          <!-- Reportes -->
          <button
            (click)="verReportes()"
            class="px-4 py-2 bg-amber-400 text-white rounded-lg hover:bg-amber-500 transition-colors duration-200 text-sm font-medium flex items-center gap-2"
          >
            <span>📊</span>
            <span class="hidden sm:inline">Reportes</span>
          </button>

          <!-- Direcciones -->
          <button
            (click)="verDirecciones()"
            class="px-4 py-2 bg-rose-500 text-white rounded-lg hover:bg-rose-600 transition-colors duration-200 text-sm font-medium flex items-center gap-2"
          >
            <span>📍</span>
            <span class="hidden sm:inline">Mis Direcciones</span>
          </button>

          <!-- Cerrar sesión -->
          <button
            (click)="cerrarSesion()"
            class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors duration-200 text-sm font-medium"
          >
            Cerrar Sesión
          </button>
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
    <div class="bg-white rounded-lg shadow-md p-6">
      <h1 class="text-3xl font-bold text-gray-900 mb-6">Mi Perfil</h1>

      <!-- Sección de Foto de Perfil -->
      <div class="mb-8 border-t border-gray-200 pt-6">
        <h2 class="text-xl font-semibold text-gray-800 mb-4">Foto de Perfil</h2>

        <!-- Mensajes de éxito/error -->
        <div
          *ngIf="errorMessage"
          class="mb-4 p-4 bg-red-50 border border-red-200 rounded-lg"
        >
          <p class="text-red-800 text-sm">{{ errorMessage }}</p>
        </div>

        <div
          *ngIf="successMessage"
          class="mb-4 p-4 bg-green-50 border border-green-200 rounded-lg"
        >
          <p class="text-green-800 text-sm">{{ successMessage }}</p>
        </div>

        <!-- Foto actual -->
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Foto Actual
          </label>
          <div class="flex items-center gap-4">
            <div
              class="w-24 h-24 rounded-full overflow-hidden bg-gray-200 flex items-center justify-center"
            >
              <img
                *ngIf="fotoPerfil"
                [src]="fotoPerfil"
                alt="Foto de perfil"
                class="w-full h-full object-cover"
                (error)="fotoPerfil = null"
              />
              <svg
                *ngIf="!fotoPerfil"
                class="w-12 h-12 text-gray-400"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
                />
              </svg>
            </div>
            <button
              *ngIf="fotoPerfil"
              (click)="eliminarFotoPerfil()"
              [disabled]="loading"
              class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors duration-200 font-medium disabled:opacity-50 disabled:cursor-not-allowed"
            >
              Eliminar Foto
            </button>
          </div>
        </div>

        <!-- Formulario para actualizar foto -->
        <div class="space-y-4">
          <div>
            <label
              for="fotoUrl"
              class="block text-sm font-medium text-gray-700 mb-2"
            >
              URL de la Foto
            </label>
            <input
              type="text"
              id="fotoUrl"
              [(ngModel)]="nuevaFotoUrl"
              placeholder="https://ejemplo.com/foto.jpg"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
              [disabled]="loading"
            />
            <p class="mt-1 text-xs text-gray-500">
              Formatos permitidos: .jpg, .jpeg, .png, .gif, .webp o base64
            </p>
          </div>

          <button
            (click)="actualizarFotoPerfil()"
            [disabled]="loading || !nuevaFotoUrl || nuevaFotoUrl.trim() === ''"
            class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors duration-200 font-medium disabled:opacity-50 disabled:cursor-not-allowed"
          >
            <span *ngIf="!loading">Actualizar Foto</span>
            <span *ngIf="loading">Actualizando...</span>
          </button>
        </div>
      </div>

      <!-- Información del usuario -->
      <div class="mb-8">
        <h2 class="text-xl font-semibold text-gray-800 mb-4">
          Información Personal
        </h2>
        <div class="space-y-3">
          <div>
            <label class="block text-sm font-medium text-gray-700"
              >Nombre</label
            >
            <p class="mt-1 text-gray-900">{{ userName }}</p>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700"
              >Correo</label
            >
            <p class="mt-1 text-gray-900">{{ userEmail || "No disponible" }}</p>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700"
              >Teléfono</label
            >
            <p class="mt-1 text-gray-900">
              {{ userTelefono || "No disponible" }}
            </p>
          </div>
        </div>
      </div>

      <!-- Sección de eliminar cuenta -->
      <app-eliminar-cuenta [userRole]="userRole"></app-eliminar-cuenta>
    </div>
  </main>
</div>
