<header class="bg-gradient-to-r from-amber-400 via-yellow-400 to-orange-500 text-white shadow-md">
  <!-- Linea visual YA-->
  <div class="container mx-auto px-4 py-3 flex justify-between items-center font-poppins">
    <!-- Logo / Nombre de la aplicación -->
    <div class="flex items-center space-x-4">
      <h1
        class="text-2xl font-bold cursor-pointer hover:text-white/90 transition"
        routerLink="/main"
      >
        QuickDelivery
      </h1>
    </div>

    <!-- Navegación -->
    <nav class="hidden md:flex space-x-6 text-sm font-semibold">
      <a
        routerLink="/main"
        routerLinkActive="border-b-2 border-white"
        class="hover:text-white/90 transition pb-1"
      >
        Inicio
      </a>
      <a
        routerLink="/cliente/direcciones"
        routerLinkActive="border-b-2 border-white"
        class="hover:text-white/90 transition pb-1"
      >
        Mis Direcciones
      </a>
      <a
        routerLink="/cliente/pedidos"
        routerLinkActive="border-b-2 border-white"
        class="hover:text-white/90 transition pb-1"
      >
        Mis Pedidos
      </a>
      <a
        routerLink="/perfil"
        routerLinkActive="border-b-2 border-white"
        class="hover:text-white/90 transition pb-1"
      >
        Mi Perfil
      </a>
    </nav>

    <!-- Usuario y logout -->
    <div class="flex items-center space-x-4">
      <span class="hidden md:block text-white/90">{{ userName }}</span>
      <button
        (click)="logout()"
        class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg font-semibold transition"
      >
        Cerrar Sesión
      </button>
    </div>
  </div>

  <!-- Navegación móvil -->
  <nav
    class="md:hidden bg-gradient-to-r from-amber-500 via-yellow-500 to-orange-600 px-4 py-2 space-y-2 font-poppins"
  >
    <a
      routerLink="/main"
      routerLinkActive="bg-white/20"
      class="block py-2 px-3 rounded hover:bg-white/20 transition"
    >
      Inicio
    </a>
    <a
      routerLink="/cliente/direcciones"
      routerLinkActive="bg-white/20"
      class="block py-2 px-3 rounded hover:bg-white/20 transition"
    >
      Mis Direcciones
    </a>
    <a
      routerLink="/cliente/pedidos"
      routerLinkActive="bg-white/20"
      class="block py-2 px-3 rounded hover:bg-white/20 transition"
    >
      Mis Pedidos
    </a>
    <a
      routerLink="/perfil"
      routerLinkActive="bg-white/20"
      class="block py-2 px-3 rounded hover:bg-white/20 transition"
    >
      Mi Perfil
    </a>
  </nav>
</header>

<div
  *ngIf="notificacionPedido"
  class="fixed right-4 top-24 z-50 w-[calc(100%-2rem)] max-w-sm rounded-lg border border-amber-200 bg-white p-4 shadow-xl font-poppins"
  role="status"
  aria-live="polite">
  <div class="flex items-start gap-3">
    <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-amber-100 text-amber-700">
      <span class="text-lg">!</span>
    </div>

    <div class="min-w-0 flex-1">
      <p class="font-bold text-gray-900">{{ notificacionPedido.titulo }}</p>
      <p class="mt-1 text-sm text-gray-600">{{ notificacionPedido.mensaje }}</p>
      <a
        routerLink="/cliente/pedidos"
        class="mt-3 inline-flex text-sm font-semibold text-orange-600 hover:text-orange-700"
        (click)="cerrarNotificacionPedido()">
        Ver mis pedidos
      </a>
    </div>

    <button
      type="button"
      class="rounded-md px-2 text-xl leading-none text-gray-400 hover:bg-gray-100 hover:text-gray-700"
      aria-label="Cerrar notificacion"
      (click)="cerrarNotificacionPedido()">
      x
    </button>
  </div>
</div>
