<!-- Sección de eliminar cuenta -->
<!--Linea visual YAA-->
<div class="border-t border-gray-200 pt-6 font-poppins">
  <h2 class="text-xl font-semibold text-red-500 mb-4">Zona de Peligro</h2>

  <p class="text-sm text-gray-600 mb-4">
    Una vez que elimines tu cuenta, no podrás volver a iniciar sesión.
    Esta acción no se puede deshacer.
  </p>

  <!-- Mensaje de error -->
  <div
    *ngIf="errorMessage"
    class="mb-4 p-4 bg-red-100 border border-red-200 rounded-lg"
  >
    <p class="text-red-700 text-sm">{{ errorMessage }}</p>
  </div>

  <!-- Mensaje de éxito -->
  <div
    *ngIf="successMessage"
    class="mb-4 p-4 bg-rose-100 border border-rose-200 rounded-lg"
  >
    <p class="text-rose-700 text-sm">{{ successMessage }}</p>
  </div>

  <!-- Formulario -->
  <div class="space-y-4">
    <div>
      <label
        for="contrasena"
        class="block text-sm font-medium text-gray-700 mb-2"
      >
        Confirma tu contraseña para eliminar la cuenta
      </label>
      <input
        type="password"
        id="contrasena"
        [(ngModel)]="contrasena"
        placeholder="Ingresa tu contraseña"
        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-300 focus:border-transparent outline-none bg-white"
        [disabled]="loading"
      />
    </div>

    <button
      (click)="eliminarCuenta()"
      [disabled]="loading || !contrasena || contrasena.trim() === ''"
      class="px-6 py-2 bg-red-400 text-white rounded-lg hover:bg-red-500 transition-colors duration-200 font-medium disabled:opacity-50 disabled:cursor-not-allowed"
    >
      <span *ngIf="!loading">Eliminar Cuenta</span>
      <span *ngIf="loading">Eliminando...</span>
    </button>
  </div>
</div>
