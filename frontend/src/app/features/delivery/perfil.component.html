<div class="min-h-screen bg-white font-poppins">

  <!--Lineal Visual YAA-->
  <app-header></app-header>

  <main class="max-w-4xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
    <div class="bg-white rounded-lg shadow-md p-6">
      <h1 class="text-3xl font-bold text-gray-900 mb-6">Mi Perfil</h1>

      <!-- Sección de Foto de Perfil -->
      <div class="mb-8 border-t border-gray-300 pt-6">
        <h2 class="text-xl font-semibold text-gray-800 mb-4">Foto de Perfil</h2>

        <!-- Mensaje error -->
        <div
          *ngIf="errorMessage"
          class="mb-4 p-4 bg-rose-50 border border-rose-200 rounded-lg"
        >
          <p class="text-rose-700 text-sm">{{ errorMessage }}</p>
        </div>

        <!-- Mensaje éxito -->
        <div
          *ngIf="successMessage"
          class="mb-4 p-4 bg-yellow-50 border border-yellow-200 rounded-lg"
        >
          <p class="text-yellow-800 text-sm">{{ successMessage }}</p>
        </div>

        <!-- Foto actual -->
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Foto Actual
          </label>
          <div class="flex items-center gap-4">
            <div
              class="w-24 h-24 rounded-full overflow-hidden bg-gray-200 flex items-center justify-center"
            >
              <img
                *ngIf="fotoPerfil"
                [src]="fotoPerfil"
                alt="Foto de perfil"
                class="w-full h-full object-cover"
                (error)="fotoPerfil = null"
              />
              <svg
                *ngIf="!fotoPerfil"
                class="w-12 h-12 text-gray-400"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
                />
              </svg>
            </div>

            <button
              *ngIf="fotoPerfil"
              (click)="eliminarFotoPerfil()"
              [disabled]="loading"
              class="px-4 py-2 bg-red-600 text-white rounded-lg
                     hover:bg-red-700 transition-colors duration-200
                     font-medium disabled:opacity-50 disabled:cursor-not-allowed"
            >
              Eliminar Foto
            </button>
          </div>
        </div>

        <!-- Formulario para actualizar foto -->
        <div class="space-y-4">
          <div>
            <label
              for="fotoUrl"
              class="block text-sm font-medium text-gray-700 mb-2"
            >
              URL de la Foto
            </label>
            <input
              type="text"
              id="fotoUrl"
              [(ngModel)]="nuevaFotoUrl"
              placeholder="https://ejemplo.com/foto.jpg"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg 
                     focus:ring-2 focus:ring-red-500 focus:border-transparent outline-none"
              [disabled]="loading"
            />
            <p class="mt-1 text-xs text-gray-500">
              Formatos permitidos: .jpg, .jpeg, .png, .gif, .webp o base64
            </p>
          </div>

          <button
            (click)="actualizarFotoPerfil()"
            [disabled]="loading || !nuevaFotoUrl || nuevaFotoUrl.trim() === ''"
            class="px-6 py-2 bg-red-600 text-white rounded-lg 
                   hover:bg-red-700 transition-colors duration-200 
                   font-medium disabled:opacity-50 disabled:cursor-not-allowed"
          >
            <span *ngIf="!loading">Actualizar Foto</span>
            <span *ngIf="loading">Actualizando...</span>
          </button>
        </div>
      </div>

      <!-- Información personal -->
      <div class="mb-8">
        <h2 class="text-xl font-semibold text-gray-800 mb-4">
          Información Personal
        </h2>
        <div class="space-y-3">
          <div>
            <label class="block text-sm font-medium text-gray-700">Nombre</label>
            <p class="mt-1 text-gray-900">{{ userName }}</p>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Correo</label>
            <p class="mt-1 text-gray-900">{{ userEmail || "No disponible" }}</p>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Teléfono</label>
            <p class="mt-1 text-gray-900">
              {{ userTelefono || "No disponible" }}
            </p>
          </div>
        </div>
      </div>

      <!-- Eliminar cuenta -->
      <app-eliminar-cuenta [userRole]="userRole"></app-eliminar-cuenta>
    </div>
  </main>
</div>
