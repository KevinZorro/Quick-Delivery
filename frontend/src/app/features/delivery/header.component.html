<header class="bg-gradient-to-r from-rose-500 via-red-500 to-yellow-500 text-white shadow-md font-poppins">
  <div class="container mx-auto px-4 py-3 flex justify-between items-center">

    <!--Linea visual YAA-->
    <!-- Logo -->
    <div class="flex items-center space-x-4">
      <h1 class="text-2xl font-bold cursor-pointer" routerLink="/delivery/main">
        QuickDelivery
      </h1>
    </div>

    <!-- Navegación -->
    <nav class="hidden md:flex space-x-6">
      <a 
        routerLink="/delivery/main" 
        routerLinkActive="border-b-2 border-white"
        class="hover:text-gray-200 transition pb-1"
      >
        Inicio
      </a>
      <a 
        routerLink="/delivery/entregas" 
        routerLinkActive="border-b-2 border-white"
        class="hover:text-gray-200 transition pb-1"
      >
        Mis Entregas
      </a>
      <a 
        routerLink="/delivery/perfil" 
        routerLinkActive="border-b-2 border-white"
        class="hover:text-gray-200 transition pb-1"
      >
        Mi Perfil
      </a>
    </nav>

    <!-- Usuario y logout -->
    <div class="flex items-center space-x-4">
      <span class="hidden md:block text-gray-100">{{ userName }}</span>
      <button 
        (click)="logout()" 
        class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded transition text-white"
      >
        Cerrar Sesión
      </button>
    </div>
  </div>

  <!-- Navegación móvil -->
  <nav class="md:hidden bg-white text-gray-700 px-4 py-2 space-y-2 shadow-inner font-poppins">
    <a 
      routerLink="/delivery/main" 
      routerLinkActive="bg-rose-100"
      class="block py-2 px-3 rounded hover:bg-rose-200 transition"
    >
      Inicio
    </a>
    <a 
      routerLink="/delivery/entregas" 
      routerLinkActive="bg-rose-100"
      class="block py-2 px-3 rounded hover:bg-rose-200 transition"
    >
      Mis Entregas
    </a>
    <a 
      routerLink="/delivery/perfil" 
      routerLinkActive="bg-rose-100"
      class="block py-2 px-3 rounded hover:bg-rose-200 transition"
    >
      Mi Perfil
    </a>
  </nav>
</header>
